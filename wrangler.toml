name = "moneymcp"
main = "worker/index.ts"
compatibility_date = "2025-06-01"
compatibility_flags = ["nodejs_compat"]

# Persistent, queryable logs in the Cloudflare dashboard (Workers > moneymcp > Logs)
[observability]
enabled = true

# Cloudflare D1 (SQLite). database_id is filled in at provisioning time
# (`wrangler d1 create moneymcp`). Local dev (`wrangler dev`) uses local state
# and ignores the id.
[[d1_databases]]
binding = "DB"
database_name = "moneymcp"
database_id = "d6e10474-285a-4091-90ec-388b300922cf"

# OAuth token/grant storage (@cloudflare/workers-oauth-provider)
[[kv_namespaces]]
binding = "OAUTH_KV"
id = "b5a38203be884b4e903fc79a338d34c5"

# Static assets: the React/shadcn dashboard (web/dist), served at the root.
# API/OAuth/MCP paths are handled by the Worker (run_worker_first); everything
# else falls back to the SPA's index.html.
[assets]
directory = "web/dist"
not_found_handling = "single-page-application"
run_worker_first = ["/mcp", "/authorize", "/token", "/register", "/callback/*", "/.well-known/*", "/app/*"]
